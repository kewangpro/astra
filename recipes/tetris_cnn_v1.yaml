name: tetris_cnn_v1
version: "1.1.0"
created_at: "2026-06-20"
task_type: rl
domain: Tetris
env_id: Tetris-v0
target_metric:
  lines_cleared: 20
description: >
  PPO recipe for Tetris-v0 using a flat 224-element observation and MlpPolicy.
  Placement-based action space (Discrete 40 = rotation × column) removes the
  need for CNN spatial processing — MLP over the flat board is sufficient and
  far easier for LLM code generation. Reward is quadratic on lines cleared to
  strongly incentivise Tetrises over singles.

architecture:
  type: MLP
  net_arch: [256, 256]

hyperparameters:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

reward_shaping:
  # Quadratic multiplier: clearing 4 lines yields 160 vs 4×10=40 for singles
  line_clear_multiplier: 10.0
  piece_placement: 1.0
  hole_penalty: 2.0
  bumpiness_penalty: 0.5
  # height_penalty should be negative — penalizes tall stacks
  height_penalty: -0.1
  death_penalty: -10.0

env_kwargs:
  max_steps: 500
