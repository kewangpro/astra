name: ensemble_grpo_v1
version: "1.0.0"
created_at: "2026-07-03"
task_type: grpo
domain: NLP
description: >
  GRPO (Group Relative Policy Optimization) fine-tuning for the Ensemble
  routing model. Wraps the existing ensemble/finetune/grpo_train.py script
  rather than reimplementing the on-policy rollout/reward/advantage loop —
  astra only orchestrates dispatch, telemetry, and pivoting. Runs on the Mac
  Mini, where ~/finetune holds the script + adapters and ~/finetune-env has
  mlx_lm installed.

hyperparameters:
  base_model: mlx-community/gemma-3-12b-it-4bit
  finetune_dir: /Users/kewang/finetune          # remote host path to ensemble/finetune checkout
  python_bin: /Users/kewang/finetune-env/bin/python
  # Warm-start target per docs/FINETUNE.md ("Warm-start target: grpo_v9_min/best
  # (8L) — the current best conductor_min.md adapter") — NOT grpo_train.py's own
  # generic DEFAULT_ADAPTER constant ("finetune/adapters/retrain_best"), which is
  # a mutable pointer overwritten whenever a new run is promoted, and NOT even
  # correctly relative to this cwd (see git history for that bug).
  adapter: adapters/grpo_v9_min/best
  prompt_template: backend/prompts/conductor_min.md
  # LoRA — 8 is REQUIRED here, not the script's raw --num-layers default of 16:
  # "must match the warm-start adapter... All current adapters use --num-layers 8.
  # Do NOT use --num-layers 12/16 — LoRA weight shapes will be incompatible."
  num_layers: 8
  lora_rank: 8
  lora_scale: 20.0
  lora_dropout: 0.0
  # GRPO — values below are the documented CURRENT BEST-PRACTICE overrides from
  # docs/FINETUNE.md's Key Flags table and the grpo_v9_min run history entry
  # (the warm-start target above), NOT grpo_train.py's raw argparse defaults,
  # which are stale/generic (iters=300, num_generations=4, max_tokens=256,
  # email_weight=3).
  iters: 100                   # "use 100 — gains are front-loaded" (raw default 300)
  num_generations: 2            # K=2, matching grpo_v9_min; K=4 regressed in grpo_v10_min (raw default 4)
  temp: 1.2
  max_tokens: 96                # "use 96 — skill name appears in first ~80 tokens, halves step time" (raw default 256)
  eval_max_tokens: 256          # do NOT lower — must stay >=200 for full JSON parse
  reward_schema: v1              # v2 is experimental and regressed in grpo_v12_min
  email_weight: 0                # "set to 0 to exclude email cases (GRPO-impenetrable)" — all runs since grpo_v8_min use 0 (raw default 3)
  focus_weight: 10
  max_zero_steps: 3
  max_one_steps: 3
  # Optimizer
  learning_rate: 0.000001       # 1e-6
  clip_epsilon: 0.1
  max_grad_norm: 1.0
  # Logging / saving
  steps_per_report: 1
  steps_per_eval: 25
  save_every: 25
  routing_only: true

# No astra-managed dataset — grpo_train.py's oracle is a hardcoded constant
# (backend/core/eval_cases.yaml, relative to finetune_dir), not a CLI-configurable
# parameter. Post-training goal-metric evaluation should use finetune/bare_eval.py
# --adapter <checkpoint_dir>/best, the actual adapter-discriminating eval tool
# (run_eval.py is saturated and doesn't distinguish between adapters) — NOT YET
# wired into astra's evaluator; currently only the training script's own live
# "Pass rate" lines are tracked via telemetry.
