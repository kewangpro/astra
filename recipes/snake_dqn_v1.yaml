name: snake_dqn_v1
version: "1.1.1"
created_at: "2026-06-29"
task_type: RL
domain: Snake
algorithm: DQN
description: >
  DQN recipe for Snake-v0. Off-policy with a replay buffer — reuses past
  experience so it needs fewer environment steps than PPO to reach the same
  food_eaten score. Better suited for sparse rewards (only triggered on food)
  than PPO, which discards experience after each update. Uses the same compact
  25D feature obs as the PPO recipe so policy weights and env_kwargs are
  compatible.

  v1.1.0: exploration_fraction/exploration_final_eps raised — the curriculum
  (_inject_curriculum in code_generator.py) calls .learn() per-phase with
  reset_num_timesteps=False for phases 1+, so SB3's _setup_learn() accumulates
  total_timesteps across the WHOLE curriculum (3,000,000), not per-phase.
  exploration_fraction=0.3 was therefore decaying epsilon to its floor by
  ~900k cumulative steps — inside phase 2 — leaving essentially zero
  exploration (0.05) for all of phase 3 (the 16x16 grid, the actual
  food_eaten=100 target, starting at 1,000,000 cumulative steps), right when
  the agent most needs to explore state space it's never seen at smaller grid
  sizes. buffer_size/train_freq also adjusted to reduce the persistent
  replay-buffer memory footprint and background CPU load.

  v1.1.1: removed optimize_memory_usage — SB3's ReplayBuffer raises ValueError
  when combined with the default handle_timeout_termination=True ("does not
  support optimize_memory_usage=True and handle_timeout_termination=True
  simultaneously"). Confirmed live: crashed every launch attempt (3 heal
  retries + 1 regenerated plan, all identical failure) until removed.
  handle_timeout_termination isn't in code_generator.py's _VALID_DQN_KEYS, so
  it can't be set to False from the recipe either — dropping the flag is the
  simplest fix; buffer_size=50000 alone still meaningfully reduces memory vs
  the original 100000 without touching this SB3 constraint.

hyperparameters:
  algorithm: DQN
  learning_rate: 0.0001
  buffer_size: 50000          # replay buffer — halved; old small-grid transitions
                               # are less representative once curriculum advances
  learning_starts: 10000      # collect experience before first gradient step
  batch_size: 32
  gamma: 0.99
  tau: 1.0                    # hard target network update
  train_freq: 8                # train every 8 env steps (was 4) — less CPU contention
  gradient_steps: 1
  target_update_interval: 1000
  exploration_fraction: 0.6   # was 0.3 — see v1.1.0 note above; extends real
                               # exploration into curriculum phase 3
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.1  # was 0.05 — keep some exploration alive late-run
  max_grad_norm: 10.0
  policy_kwargs:
    net_arch: [256, 256]
  # Training budget
  total_timesteps: 3000000
  telemetry_interval: 2048
  eval_episodes: 10

env_kwargs:
  obs_type: features          # 25D compact feature vector — same as PPO recipe
  max_steps: 2000
  food_reward: 20.0
  death_penalty: -10.0
  distance_weight: 0.3
  survival_bonus: 0.01

# Same curriculum phases as PPO — grid size progression is algorithm-agnostic.
curriculum:
  phases:
    - grid_h: 8
      grid_w: 8
      food_target: 15
      timesteps: 300000
    - grid_h: 12
      grid_w: 12
      food_target: 40
      timesteps: 700000
    - grid_h: 16
      grid_w: 16
      food_target: 100
      timesteps: 2000000
